---
name: "Update build base version"

sources:
  current_minor:
    name: Get current build base minor version from Dockerfile
    kind: dockerfile
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: GO_IMAGE
    transformers:
      - trimprefix: "rancher/hardened-build-base:"
      - trimprefix: "v"
      - findsubmatch:
          pattern: '^([0-9]+\.[0-9]+)'
      - kind: lastelement

  latest_patch:
    name: Get latest build base patch for that minor
    kind: githubrelease
    dependson:
      - "current_minor"
    spec:
      owner: rancher
      repository: image-build-base
      token: '{{ requiredEnv .github.token }}'
      typefilter:
        release: true
        draft: false
        prerelease: false
      versionfilter:
        kind: regex
        pattern: 'v{{ source "current_minor" }}\.\S+'

targets:
  dockerfile:
    name: "Bump to latest build base version in Dockerfile"
    kind: dockerfile
    scmid: default
    sourceid: latest_patch
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: "GO_IMAGE"
    transformers:
      - addprefix: "rancher/hardened-build-base:"

scms:
  default:
    kind: github
    spec:
      token: '{{ requiredEnv .github.token }}'
      username: '{{ requiredEnv .github.username }}'
      user: '{{ .github.user }}'
      email: '{{ .github.email }}'
      owner: '{{ .github.owner }}'
      repository: '{{ .github.repository }}'
      branch: '{{ .github.branch }}'

actions:
  default:
    title: 'Bump build base version to {{ source "latest_patch" }}'
    kind: github/pullrequest
    spec:
      automerge: false
    scmid: default
