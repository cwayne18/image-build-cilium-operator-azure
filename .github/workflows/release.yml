name: Release
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

# Release tags must include build metadata, e.g. operator-azure vX.Y.Z-build20250101
jobs:
  release:
    permissions:
      contents: read
      packages: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up QEMU
      uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

    - name: Log in to GHCR
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push multi-arch hardened image(s)
      run: make push-image-all
      env:
        TAG: ${{ github.event.release.tag_name }}
        TARGET_PLATFORMS: linux/amd64,linux/arm64
